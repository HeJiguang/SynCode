# Local overrides: keep RAG toggles and AI facade settings here, while model/provider settings stay in Nacos.
# If you use Qwen / DashScope, see nacos-oj-ai-qwen-example.yaml.
spring:
  # Token refresh relies on Redis and is aligned with gateway / friend services.
  data:
    redis:
      host: localhost
      port: 16379
      password: ${REDIS_PASSWORD:change-me-local}
  ai:
    rag:
      enabled: true
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          model: text-embedding-v4

ai:
  agent:
    facade:
      mode: langgraph
      base-url: http://localhost:8000
      chat-path: /api/chat
      stream-path: /api/chat/stream

jwt:
  secret: ${JWT_SECRET:change-me-local-jwt-secret}
