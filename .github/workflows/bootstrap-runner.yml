name: bootstrap-runner

on:
  workflow_dispatch:
    inputs:
      runner_name:
        description: Optional override for the runner name
        required: false
        type: string

permissions:
  contents: read

jobs:
  bootstrap:
    name: Install Self-Hosted Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          owner_lower="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image_tag="sha-${GITHUB_SHA::12}"
          runner_name="${{ github.event.inputs.runner_name }}"
          if [[ -z "${runner_name}" ]]; then
            runner_name="syncode-prod-101-96-200-76"
          fi
          echo "registry_namespace=ghcr.io/${owner_lower}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "runner_name=${runner_name}" >> "$GITHUB_OUTPUT"

      - name: Build runner image
        shell: bash
        run: |
          docker build \
            -t "syncode-self-hosted-runner:${{ steps.meta.outputs.image_tag }}" \
            -f deploy/runner/Dockerfile .

      - name: Pack runner image
        shell: bash
        run: |
          mkdir -p .cd-tmp
          docker save "syncode-self-hosted-runner:${{ steps.meta.outputs.image_tag }}" | gzip > .cd-tmp/syncode-self-hosted-runner.tar.gz

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Install runner on manager
        shell: bash
        run: |
          runner_image="syncode-self-hosted-runner:${{ steps.meta.outputs.image_tag }}"
          runner_name="${{ steps.meta.outputs.runner_name }}"

          ssh "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "mkdir -p ~/onlineoj-runner"
          scp .cd-tmp/syncode-self-hosted-runner.tar.gz "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:~/onlineoj-runner/syncode-self-hosted-runner.tar.gz"

          ssh "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "\
            set -euo pipefail && \
            gunzip -c ~/onlineoj-runner/syncode-self-hosted-runner.tar.gz | docker load >/dev/null && \
            docker volume create syncode_runner_data >/dev/null && \
            docker rm -f syncode-runner-bootstrap syncode-runner >/dev/null 2>&1 || true && \
            docker run -d --name syncode-runner-bootstrap \
              -e RUNNER_NAME='${runner_name}' \
              -e RUNNER_REPO_URL='https://github.com/${{ github.repository }}' \
              -e RUNNER_TOKEN='${{ secrets.SELF_HOSTED_RUNNER_BOOTSTRAP_TOKEN }}' \
              -e RUNNER_LABELS='syncode-prod' \
              -v syncode_runner_data:/runner \
              -v /var/run/docker.sock:/var/run/docker.sock \
              '${runner_image}' >/dev/null && \
            i=0 && \
            until docker exec syncode-runner-bootstrap test -f /runner/.runner; do \
              i=\$((i+1)); \
              if [ \${i} -ge 30 ]; then \
                docker logs syncode-runner-bootstrap; \
                exit 1; \
              fi; \
              sleep 2; \
            done && \
            docker rm -f syncode-runner-bootstrap >/dev/null && \
            docker run -d --name syncode-runner --restart unless-stopped \
              -e RUNNER_NAME='${runner_name}' \
              -e RUNNER_REPO_URL='https://github.com/${{ github.repository }}' \
              -e RUNNER_LABELS='syncode-prod' \
              -v syncode_runner_data:/runner \
              -v /var/run/docker.sock:/var/run/docker.sock \
              '${runner_image}' >/dev/null && \
            rm -f ~/onlineoj-runner/syncode-self-hosted-runner.tar.gz && \
            docker ps --filter name=syncode-runner"
